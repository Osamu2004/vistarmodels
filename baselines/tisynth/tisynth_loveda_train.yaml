data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 2
    wrap: false
    train:
      target: ldm.data.GID24_Control_ref.GID24Train
      params:
        size: 512
    validation:
      target: ldm.data.GID24_Control_ref.GID24Validation
      params:
        size: 512

base_learning_rate: 1.0e-5

lightning:
  modelcheckpoint:
    params:
      every_n_train_steps: 10000
      save_top_k: -1
      save_last: true
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 1000
        max_images: 1
        increase_log_steps: false
  trainer:
    benchmark: true
    max_steps: 100000
